<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌦 Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌦 Weather App</h1>
        <p>Get weather information for any city or your current location</p>
        
        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                autocomplete="off"
            />
            <button id="searchBtn">Search</button>
            <button id="locationBtn">📍 Use My Location</button>
        </div>

        <div id="weather" class="weather-display hidden">
            <div class="weather-info">
                <div id="city" class="city-name"></div>
                <div id="temp" class="temperature"></div>
                <div id="desc" class="description"></div>
                <div id="humidity" class="humidity"></div>
                <div id="wind" class="wind"></div>
            </div>
        </div>

        <div id="forecast" class="forecast hidden">
            <h3>📅 5-Day Forecast</h3>
            <div id="forecastCards" class="forecast-cards"></div>
        </div>

        <div id="error" class="error-message hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
